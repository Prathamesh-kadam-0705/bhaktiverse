name: bhakti_app
description: Jap Counter & Bhakti Audio App - A spiritual daily-use Flutter application

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter


  # Navigation
  go_router: ^13.0.0
  get: ^4.6.6
  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.2.2

  # Network
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  retrofit: ^4.1.0

  # Audio Player
  just_audio: ^0.9.36
  audio_service: ^0.18.13
  just_audio_background: ^0.0.1-beta.11

  # Charts & Analytics
  fl_chart: ^0.68.0

  # Notifications
  flutter_local_notifications: ^17.1.2

  # UI & Animations
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  carousel_slider: ^5.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0

  # Vibration
  vibration:  ^3.1.8

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

  # Icons
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.10+1
  flutter_launcher_icons: ^0.13.1

  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_messaging: ^16.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  retrofit_generator: ^8.1.0
  json_serializable: ^6.7.1
  json_annotation: ^4.8.1



flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/

  fonts:
    - family: Mukta
      fonts:
        - asset: assets/fonts/Mukta-Regular.ttf
        - asset: assets/fonts/Mukta-Bold.ttf
          weight: 700
        - asset: assets/fonts/Mukta-SemiBold.ttf
          weight: 600


flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo.png"